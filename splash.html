<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMI Fashion Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --pink:#f472b6;
  --pink-deep:#db2777;
  --gold:#d4a843;
  --gold-light:#f0c96a;
  --dark:#0d0508;
  --dark2:#1f0a14;
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--dark);
  font-family:'Jost',sans-serif;
}

/* ============ CANVAS BACKGROUND ============ */
#bg-canvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  z-index:0;
}

/* ============ MAIN CONTAINER ============ */
#splash{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;
  transition:opacity 1s ease, transform 1s ease;
}
#splash.exit{
  opacity:0;
  transform:scale(1.06);
  pointer-events:none;
}

/* ============ DECORATIVE FRAME ============ */
.frame{
  position:absolute;inset:24px;
  pointer-events:none;
}
.frame-corner{
  position:absolute;
  width:60px;height:60px;
  opacity:0;
  animation:fadeIn .8s ease forwards;
}
.frame-corner svg{stroke:var(--gold);stroke-width:1.5;fill:none;width:100%;height:100%;}
.frame-corner.tl{top:0;left:0;animation-delay:.3s;}
.frame-corner.tr{top:0;right:0;transform:scaleX(-1);animation-delay:.4s;}
.frame-corner.bl{bottom:0;left:0;transform:scaleY(-1);animation-delay:.5s;}
.frame-corner.br{bottom:0;right:0;transform:scale(-1,-1);animation-delay:.6s;}

.frame-line{
  position:absolute;
  background:linear-gradient(to right, transparent, rgba(212,168,67,.5), transparent);
  height:1px;
  opacity:0;
  animation:growLine 1s ease forwards;
}
.frame-line.top{top:0;left:80px;right:80px;animation-delay:.7s;}
.frame-line.bottom{bottom:0;left:80px;right:80px;animation-delay:.8s;}
.frame-line-v{
  position:absolute;
  background:linear-gradient(to bottom, transparent, rgba(212,168,67,.5), transparent);
  width:1px;
  opacity:0;
  animation:growLineV 1s ease forwards;
}
.frame-line-v.left{left:0;top:80px;bottom:80px;animation-delay:.9s;}
.frame-line-v.right{right:0;top:80px;bottom:80px;animation-delay:1s;}

@keyframes growLine{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
@keyframes growLineV{from{opacity:0;transform:scaleY(0)}to{opacity:1;transform:scaleY(1)}}

/* ============ CONTENT ============ */
.content{
  position:relative;
  text-align:center;
  padding:0 40px;
  z-index:2;
}

/* Top label */
.top-label{
  font-family:'Jost',sans-serif;
  font-size:.65rem;
  font-weight:500;
  letter-spacing:6px;
  text-transform:uppercase;
  color:rgba(212,168,67,.7);
  opacity:0;
  transform:translateY(12px);
  animation:slideUp .7s ease .4s forwards;
  margin-bottom:24px;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.top-label::before,.top-label::after{
  content:'';
  width:40px;height:1px;
  background:linear-gradient(to right, transparent, rgba(212,168,67,.6));
}
.top-label::after{transform:scaleX(-1);}

/* HMI word */
.brand-hmi{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(5rem,15vw,11rem);
  font-weight:300;
  line-height:.9;
  letter-spacing:-.02em;
  color:white;
  opacity:0;
  transform:translateY(30px);
  animation:slideUp .9s cubic-bezier(.16,1,.3,1) .1s forwards;
  position:relative;
}

/* Fashion word */
.brand-fashion{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,9vw,6.5rem);
  font-weight:300;
  font-style:italic;
  line-height:1;
  letter-spacing:.05em;
  background:linear-gradient(135deg, var(--gold-light) 0%, var(--pink) 50%, var(--gold) 100%);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:slideUp .9s cubic-bezier(.16,1,.3,1) .25s forwards, shimmerBg 3s ease 1.5s infinite;
  opacity:0;
  transform:translateY(30px);
  display:block;
  margin-top:-8px;
}
@keyframes shimmerBg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Store word */
.brand-store{
  font-family:'Jost',sans-serif;
  font-size:clamp(.7rem,2vw,1rem);
  font-weight:200;
  letter-spacing:10px;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
  opacity:0;
  transform:translateY(12px);
  animation:slideUp .7s ease .5s forwards;
  margin-top:18px;
  display:block;
}

/* Divider */
.divider{
  display:flex;align-items:center;justify-content:center;
  gap:16px;
  margin:28px auto 26px;
  opacity:0;
  animation:fadeIn .8s ease .7s forwards;
  width:280px;
}
.divider-line{
  flex:1;height:1px;
  background:linear-gradient(to right, transparent, rgba(212,168,67,.5));
}
.divider-line.r{transform:scaleX(-1);}
.divider-gem{
  width:8px;height:8px;
  background:var(--gold);
  transform:rotate(45deg);
  animation:gemPulse 2s ease 1.5s infinite;
}
.divider-gem-sm{
  width:4px;height:4px;
  background:rgba(244,114,182,.6);
  transform:rotate(45deg);
}
@keyframes gemPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(212,168,67,.4)}
  50%{box-shadow:0 0 12px 4px rgba(212,168,67,.2)}
}

/* Tagline */
.tagline{
  font-family:'Jost',sans-serif;
  font-size:clamp(.72rem,1.8vw,.88rem);
  font-weight:300;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
  opacity:0;
  animation:fadeIn .8s ease .85s forwards;
}

/* Categories strip */
.categories{
  display:flex;align-items:center;justify-content:center;
  gap:20px;
  margin-top:40px;
  opacity:0;
  animation:fadeIn .8s ease 1s forwards;
  flex-wrap:wrap;
}
.cat-item{
  font-size:.62rem;
  font-weight:400;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(212,168,67,.55);
  position:relative;
}
.cat-item::after{
  content:'·';
  position:absolute;right:-12px;
  color:rgba(212,168,67,.3);
}
.cat-item:last-child::after{display:none;}

/* Loading bar */
.loading-wrap{
  margin-top:52px;
  width:200px;
  opacity:0;
  animation:fadeIn .6s ease 1.1s forwards;
}
.loading-bar{
  width:100%;
  height:1px;
  background:rgba(255,255,255,.08);
  position:relative;
  overflow:hidden;
}
.loading-bar::after{
  content:'';
  position:absolute;
  left:-100%;top:0;
  width:100%;height:100%;
  background:linear-gradient(to right, transparent, var(--gold), var(--pink), var(--gold), transparent);
  animation:loadSweep 2s ease 1.3s forwards;
}
@keyframes loadSweep{
  0%{left:-100%}
  100%{left:100%}
}
.loading-text{
  font-size:.58rem;
  letter-spacing:4px;
  color:rgba(255,255,255,.25);
  text-transform:uppercase;
  margin-top:10px;
  text-align:center;
}

/* Enter button */
.enter-btn{
  margin-top:50px;
  background:transparent;
  border:1px solid rgba(212,168,67,.4);
  color:rgba(212,168,67,.8);
  font-family:'Jost',sans-serif;
  font-size:.7rem;
  font-weight:400;
  letter-spacing:5px;
  text-transform:uppercase;
  padding:14px 40px;
  cursor:pointer;
  opacity:0;
  transition:all .4s ease;
  position:relative;
  overflow:hidden;
  animation:fadeIn .8s ease 2.2s forwards;
}
.enter-btn::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(212,168,67,.1), rgba(244,114,182,.1));
  opacity:0;
  transition:opacity .4s ease;
}
.enter-btn:hover{
  border-color:rgba(212,168,67,.8);
  color:var(--gold-light);
  letter-spacing:6px;
  box-shadow:0 0 30px rgba(212,168,67,.15);
}
.enter-btn:hover::before{opacity:1;}

/* ============ FLOATING ELEMENTS ============ */
.floaters{position:fixed;inset:0;pointer-events:none;z-index:1;}

.petal{
  position:absolute;
  border-radius:50% 0 50% 0;
  opacity:0;
  animation:petalFall linear infinite;
}

/* ============ ANIMATIONS ============ */
@keyframes slideUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* ============ MOBILE ============ */
@media(max-width:500px){
  .frame{inset:14px;}
  .frame-corner{width:40px;height:40px;}
  .categories{gap:12px;}
  .top-label::before,.top-label::after{width:20px;}
}
</style>
</head>
<body>

<!-- Particle canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Floating petals -->
<div class="floaters" id="floaters"></div>

<!-- Main splash -->
<div id="splash">

  <!-- Corner frame -->
  <div class="frame">
    <div class="frame-corner tl">
      <svg viewBox="0 0 60 60"><path d="M0 60 L0 0 L60 0"/><path d="M0 45 L0 0 L45 0" opacity=".4"/></svg>
    </div>
    <div class="frame-corner tr">
      <svg viewBox="0 0 60 60"><path d="M0 60 L0 0 L60 0"/><path d="M0 45 L0 0 L45 0" opacity=".4"/></svg>
    </div>
    <div class="frame-corner bl">
      <svg viewBox="0 0 60 60"><path d="M0 60 L0 0 L60 0"/><path d="M0 45 L0 0 L45 0" opacity=".4"/></svg>
    </div>
    <div class="frame-corner br">
      <svg viewBox="0 0 60 60"><path d="M0 60 L0 0 L60 0"/><path d="M0 45 L0 0 L45 0" opacity=".4"/></svg>
    </div>
    <div class="frame-line top"></div>
    <div class="frame-line bottom"></div>
    <div class="frame-line-v left"></div>
    <div class="frame-line-v right"></div>
  </div>

  <!-- Brand content -->
  <div class="content">

    <div class="top-label">Est. 2024 &nbsp;·&nbsp; Sitarganj</div>

    <div class="brand-hmi">HMI</div>
    <span class="brand-fashion">Fashion</span>
    <span class="brand-store">Store</span>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem-sm"></div>
      <div class="divider-gem"></div>
      <div class="divider-gem-sm"></div>
      <div class="divider-line r"></div>
    </div>

    <div class="tagline">Ethnic &nbsp;·&nbsp; Western &nbsp;·&nbsp; Kids Wear</div>

    <div class="categories">
      <span class="cat-item">Sarees</span>
      <span class="cat-item">Suits</span>
      <span class="cat-item">Kurtis</span>
      <span class="cat-item">Lehengas</span>
      <span class="cat-item">Men's Wear</span>
    </div>

    <div class="loading-wrap">
      <div class="loading-bar"></div>
      <div class="loading-text">New Collection 2026</div>
    </div>

    <button class="enter-btn" onclick="enterStore()">Enter Store</button>

  </div>
</div>

<script>
// ============ CANVAS PARTICLE BACKGROUND ============
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Particles
const particles = [];
const COLORS = ['rgba(244,114,182,', 'rgba(212,168,67,', 'rgba(255,255,255,'];

class Particle {
  constructor(){
    this.reset(true);
  }
  reset(init){
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : canvas.height + 10;
    this.size = Math.random() * 1.5 + 0.3;
    this.speedY = Math.random() * 0.4 + 0.1;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.6 + 0.1;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.twinkleSpeed = Math.random() * 0.02 + 0.005;
    this.twinkleOffset = Math.random() * Math.PI * 2;
  }
  update(t){
    this.y -= this.speedY;
    this.x += this.speedX;
    const tw = Math.sin(t * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
    this.currentOpacity = this.opacity * tw;
    if(this.y < -10) this.reset(false);
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = this.color + this.currentOpacity + ')';
    ctx.fill();
  }
}

// Create particles
for(let i=0;i<120;i++) particles.push(new Particle());

// Radial gradient mesh background
function drawBackground(){
  const w = canvas.width, h = canvas.height;

  // Base dark
  ctx.fillStyle = '#0d0508';
  ctx.fillRect(0, 0, w, h);

  // Center glow — pink
  const g1 = ctx.createRadialGradient(w*.45, h*.5, 0, w*.45, h*.5, w*.55);
  g1.addColorStop(0, 'rgba(219,39,119,.12)');
  g1.addColorStop(1, 'transparent');
  ctx.fillStyle = g1;
  ctx.fillRect(0,0,w,h);

  // Top right — gold
  const g2 = ctx.createRadialGradient(w*.85, h*.15, 0, w*.85, h*.15, w*.4);
  g2.addColorStop(0, 'rgba(212,168,67,.08)');
  g2.addColorStop(1, 'transparent');
  ctx.fillStyle = g2;
  ctx.fillRect(0,0,w,h);

  // Bottom left — deep pink
  const g3 = ctx.createRadialGradient(w*.1, h*.85, 0, w*.1, h*.85, w*.35);
  g3.addColorStop(0, 'rgba(244,114,182,.07)');
  g3.addColorStop(1, 'transparent');
  ctx.fillStyle = g3;
  ctx.fillRect(0,0,w,h);
}

// Noise grain texture
function addGrain(){
  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imageData.data;
  for(let i=0;i<data.length;i+=4){
    const noise = (Math.random()-0.5)*8;
    data[i]+=noise; data[i+1]+=noise; data[i+2]+=noise;
  }
  ctx.putImageData(imageData,0,0);
}

let frame = 0;
function animate(){
  frame++;
  drawBackground();
  particles.forEach(p=>{ p.update(frame); p.draw(); });
  // subtle grain every few frames
  if(frame%3===0) addGrain();
  requestAnimationFrame(animate);
}
animate();

// ============ FLOATING PETALS ============
const floaters = document.getElementById('floaters');
const PETAL_COLORS = [
  'rgba(244,114,182,.18)',
  'rgba(212,168,67,.14)',
  'rgba(255,255,255,.08)',
  'rgba(219,39,119,.12)'
];

function createPetal(){
  const el = document.createElement('div');
  el.className = 'petal';
  const size = Math.random()*8+4;
  const left = Math.random()*100;
  const duration = Math.random()*12+8;
  const delay = Math.random()*6;
  const color = PETAL_COLORS[Math.floor(Math.random()*PETAL_COLORS.length)];

  el.style.cssText = `
    width:${size}px;height:${size}px;
    left:${left}%;
    top:-${size}px;
    background:${color};
    animation-duration:${duration}s;
    animation-delay:${delay}s;
  `;

  el.style.animationName = 'petalFall';
  el.style.animationTimingFunction = 'linear';
  el.style.animationIterationCount = 'infinite';

  floaters.appendChild(el);
}

// Add petal animation to stylesheet
const style = document.createElement('style');
style.textContent = `
  @keyframes petalFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity:0; }
    5%   { opacity: 1; }
    95%  { opacity: .6; }
    100% { transform: translateY(110vh) rotate(${Math.random()*720}deg); opacity:0; }
  }
`;
document.head.appendChild(style);

for(let i=0;i<25;i++) createPetal();

// ============ AUTO-ENTER AFTER 4.5s + ENTER BUTTON ============
function enterStore(){
  const splash = document.getElementById('splash');
  if(splash._exiting) return; // prevent double-fire
  splash._exiting = true;
  splash.classList.add('exit');
  setTimeout(()=>{
    window.location.href = 'index.html';
  }, 1000);
}

// Auto enter after 4.5 seconds
const autoTimer = setTimeout(enterStore, 4500);

// Skip on click anywhere or key
document.addEventListener('click', function(e){
  if(!e.target.classList.contains('enter-btn')) enterStore();
});
document.addEventListener('keydown', e => {
  if(e.key==='Enter'||e.key===' '||e.key==='Escape') enterStore();
});
</script>
</body>
</html>
